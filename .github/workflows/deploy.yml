# Build and deploy the Haal Lab website to GitHub Pages.
#
# Setup:
#   1. Push this repo to GitHub.
#   2. In the repo, go to Settings → Pages → Source → "GitHub Actions".
#   3. Push to `main` (or merge a PR). This workflow builds the static site
#      and publishes it to GitHub Pages automatically.
#
# Custom domain (haal-lab.solutions):
#   - Add a CNAME file in the repo root (or set it in Settings → Pages → Custom domain).
#   - Configure DNS: A record or CNAME pointing to your GitHub Pages endpoint.
#
# Project page (username.github.io/haal-lab):
#   - Set the repository secret or variable `NEXT_PUBLIC_BASE_PATH` to `/haal-lab`
#     (replace with your repo name, no trailing slash).
#   - The build picks it up via env.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        env:
          # For project pages (username.github.io/repo-name), set this secret
          # to "/repo-name". Leave empty for user/org pages or custom domains.
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH }}
          # Optional: set to a Formspree endpoint to enable backend form submission.
          NEXT_PUBLIC_FORMSPREE_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ENDPOINT }}
          # IMPORTANT: GitHub Pages doesn't support API routes (server-side code)
          # The GROQ_API_KEY won't work with static export to GitHub Pages.
          # To use the AI assistant, deploy to Vercel, Netlify, or a Node.js server instead.
          # See DEPLOYMENT_GUIDE.md for instructions.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NODE_ENV: production
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -la out/
          if [ ! -f "out/index.html" ]; then
            echo "Error: index.html not found!"
            exit 1
          fi
          echo "Build output verified successfully"
          echo "Checking for localized pages..."
          ls -la out/en/ || echo "Warning: No /en directory found"
          echo "Checking for CNAME..."
          ls -la out/CNAME || echo "Warning: CNAME not found"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
